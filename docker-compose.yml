# Stack de desenvolvimento. PostGIS e Redis já presentes para a V1.
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: fada
      POSTGRES_PASSWORD: fada
      POSTGRES_DB: fada
    ports: ["5432:5432"]
    volumes: ["fada_pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: ./backend
    env_file: ./backend/.env
    environment:
      # Libere a origem do frontend em produção (ex.: https://app.exemplo.com).
      FADA_CORS_ORIGINS: ${FADA_CORS_ORIGINS:-*}
    ports: ["8000:8000"]
    depends_on: [db, redis]
    volumes: ["./backend:/app"]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  fada_pgdata:
